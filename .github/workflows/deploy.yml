name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy vers Coolify
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Trigger Coolify webhook
        run: |
          curl --silent --show-error --fail \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}"
