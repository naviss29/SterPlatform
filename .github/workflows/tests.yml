name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: PHPUnit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: sterplatform_test
          POSTGRES_USER: sterplatform
          POSTGRES_PASSWORD: sterplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sterplatform -d sterplatform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, intl, zip, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --no-interaction
        env:
          APP_ENV: test
          JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'test_passphrase' }}

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://sterplatform:sterplatform@127.0.0.1:5432/sterplatform_test

      - name: Run tests
        run: php bin/phpunit
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://sterplatform:sterplatform@127.0.0.1:5432/sterplatform_test
          JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'test_passphrase' }}
