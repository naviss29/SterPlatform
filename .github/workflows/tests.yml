name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: PHPUnit
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://sterplatform:sterplatform@127.0.0.1:5432/sterplatform?serverVersion=18&charset=utf8
      JWT_PASSPHRASE: test_passphrase
      MERCURE_JWT_SECRET: sterplatform_mercure_secret_key_32ch
      MERCURE_HUB_INTERNAL_URL: http://localhost:9090/.well-known/mercure
      MERCURE_HUB_PUBLIC_URL: http://localhost:9090/.well-known/mercure

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: sterplatform_test
          POSTGRES_USER: sterplatform
          POSTGRES_PASSWORD: sterplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sterplatform -d sterplatform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, intl, zip, opcache
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate JWT keypair
        run: php bin/console lexik:jwt:generate-keypair --no-interaction

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Run tests
        run: php bin/phpunit
