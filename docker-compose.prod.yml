services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    entrypoint: ["sh", "docker/php/entrypoint.sh"]
    env_file:
      - .env
      - .env.local
    environment:
      APP_ENV: prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sterplatform}
      POSTGRES_USER: ${POSTGRES_USER:-sterplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sterplatform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '${MERCURE_JWT_SECRET}'
      MERCURE_SUBSCRIBER_JWT_KEY: '${MERCURE_JWT_SECRET}'
    ports:
      - "9090:80"
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    restart: unless-stopped

volumes:
  db_data:
